<!DOCTYPE html>
<html>
<head>
<title>Attendance Report</title>

<style>
body{font-family:Arial;margin:0;background:#f2f6ff;}

.navbar{
background:#1565c0;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

.navbar span{
margin-right:20px;
cursor:pointer;
}

table{
width:80%;
margin:30px auto;
background:white;
border-collapse:collapse;
}

th,td{
padding:10px;
border:1px solid #ccc;
text-align:center;
}

th{background:#1565c0;color:white;}

.present{
color:green;
font-weight:bold;
}

.absent{
color:red;
font-weight:bold;
}

.summary{
text-align:center;
font-size:20px;
margin-top:20px;
font-weight:bold;
}
</style>
</head>

<body>

<div class="navbar">
<h2>Attendance Report</h2>
<div>
<span onclick="location.href='index.html'">Home</span>
<span onclick="location.href='dashboard.html'">Dashboard</span>
<span onclick="location.href='attendance.html'">Attendance</span>
</div>
</div>

<h2 style="text-align:center;">Student Attendance Report</h2>

<div class="summary" id="summary"></div>

<table id="table">
<tr>
<th>Name</th>
<th>Roll</th>
<th>Status</th>
</tr>
</table>

<script>

let data = JSON.parse(localStorage.getItem("attendance")) || [];
let table = document.getElementById("table");

let presentCount = 0;
let absentCount = 0;

data.forEach(s=>{

let row = table.insertRow();

row.insertCell(0).innerHTML = s.name;
row.insertCell(1).innerHTML = s.roll;

if(s.status === "Present"){
row.insertCell(2).innerHTML = "<span class='present'>Present</span>";
presentCount++;
}else{
row.insertCell(2).innerHTML = "<span class='absent'>Absent</span>";
absentCount++;
}

});

let total = data.length;
let percent = total ? ((presentCount/total)*100).toFixed(2) : 0;

document.getElementById("summary").innerHTML =
"Total: " + total +
" | Present: " + presentCount +
" | Absent: " + absentCount +
" | Attendance %: " + percent + "%";

</script>

</body>
</html>
