<!DOCTYPE html>
<html>
<head>

<title>Admin Login</title>

<style>

body{
margin:0;
font-family:Arial;
background:linear-gradient(to right,#1565c0,#42a5f5);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.login-box{
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,0.2);
text-align:center;
width:300px;
}

h2{
color:#1565c0;
}

input{
width:90%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#1565c0;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#0d47a1;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Admin Login</h2>

<input type="text" placeholder="Username">

<input type="password" placeholder="Password">

<button onclick="location.href='dashboard.html'">
Login
</button>

</div>

</body>
</html>
