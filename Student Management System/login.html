<!DOCTYPE html>
<html>
<head>
<title>Login</title>

<style>
body{
margin:0;
font-family:Arial;
background:linear-gradient(to right,#1565c0,#42a5f5);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:50px;
border-radius:12px;
text-align:center;
width:350px;
box-shadow:0 8px 20px rgba(0,0,0,0.3);
}

h2{
color:#1565c0;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:12px 0;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
}

button{
width:100%;
padding:12px;
background:#1565c0;
color:white;
border:none;
border-radius:6px;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#0d47a1;
}

</style>
</head>

<body>

<div class="box">
<h2>Admin Login</h2>

<input type="text" placeholder="Username">
<input type="password" placeholder="Password">

<button onclick="location.href='dashboard.html'">Login</button>
</div>

</body>
</html>
