<!DOCTYPE html>
<html>
<head>

<title>Add Student</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f2f6ff;
}

.header{
background:#1565c0;
color:white;
padding:15px;
text-align:center;
}

.form-box{
background:white;
width:350px;
margin:40px auto;
padding:30px;
border-radius:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.2);
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#1565c0;
color:white;
border:none;
border-radius:5px;
font-size:16px;
}

</style>

</head>

<body>

<div class="header">
<h2>Add Student</h2>
</div>

<div class="form-box">

<input type="text" placeholder="Student Name">

<input type="text" placeholder="Roll Number">

<input type="text" placeholder="Department">

<input type="text" placeholder="Phone Number">

<input type="email" placeholder="Email">

<button>Add Student</button>

</div>

</body>
</html>
