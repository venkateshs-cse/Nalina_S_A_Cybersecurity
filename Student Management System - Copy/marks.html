<!DOCTYPE html>
<html>
<head>
<title>Marks</title>

<style>
body{font-family:Arial;margin:0;background:#f2f6ff;}

.navbar{
background:#1565c0;
color:white;
padding:15px;
display:flex;
justify-content:space-between;
}

.navbar span{
margin-right:20px;
cursor:pointer;
}

table{
width:90%;
margin:30px auto;
background:white;
border-collapse:collapse;
}

th,td{
padding:10px;
border:1px solid #ccc;
text-align:center;
}

th{background:#1565c0;color:white;}

input{
width:60px;
padding:5px;
}

button{
display:block;
margin:20px auto;
padding:10px 20px;
background:#1565c0;
color:white;
border:none;
}
</style>
</head>

<body>

<div class="navbar">
<h2>Marks</h2>
<div>
<span onclick="location.href='index.html'">Home</span>
<span onclick="location.href='dashboard.html'">Dashboard</span>
<span onclick="location.href='addstudent.html'">Add Student</span>
<span onclick="location.href='viewstudents.html'">View Students</span>
</div>
</div>

<h2 style="text-align:center;">Enter Student Marks</h2>

<table id="table">
<tr>
<th>Name</th>
<th>Roll</th>
<th>Tamil</th>
<th>English</th>
<th>Maths</th>
<th>Total</th>
</tr>
</table>

<button onclick="save()">Save Marks</button>

<script>

let students = JSON.parse(localStorage.getItem("students")) || [];
let table = document.getElementById("table");

students.forEach((s,index)=>{

let row = table.insertRow();

row.insertCell(0).innerHTML = s.name;
row.insertCell(1).innerHTML = s.roll;

row.insertCell(2).innerHTML = `<input id="t${index}" type="number">`;
row.insertCell(3).innerHTML = `<input id="e${index}" type="number">`;
row.insertCell(4).innerHTML = `<input id="m${index}" type="number">`;

row.insertCell(5).innerHTML = `<span id="total${index}">0</span>`;
});

function save(){

let marksData = [];

students.forEach((s,index)=>{

let t = Number(document.getElementById("t"+index).value) || 0;
let e = Number(document.getElementById("e"+index).value) || 0;
let m = Number(document.getElementById("m"+index).value) || 0;

let total = t + e + m;

marksData.push({
name:s.name,
roll:s.roll,
tamil:t,
english:e,
maths:m,
total:total
});

});

localStorage.setItem("marks", JSON.stringify(marksData));

alert("Marks Saved");
}

</script>

</body>
</html>
